version: '3.8'

services:
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=${DATABASE_URL_STAGING} # Raw connection to your managed DB
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - POOL_MODE=transaction
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  api:
    build:
      context: ./Whatsapp-Bot
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgres://postgres:postgres@pgbouncer:5432/partsunion
      - REDIS_URL=redis://redis:6379
      - SENTRY_DSN=${SENTRY_DSN}
    ports:
      - "3000:3000"
    depends_on:
      - pgbouncer
      - redis

  worker:
    build:
      context: ./Whatsapp-Bot
      dockerfile: worker.Dockerfile
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgres://postgres:postgres@pgbouncer:5432/partsunion
      - REDIS_URL=redis://redis:6379
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      - pgbouncer
      - redis

  dashboard:
    build:
      context: ./User-Dashboard
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=https://api-staging.partsunion.com
    ports:
      - "8080:80"

volumes:
  redis_data:
